name: Bug report
description: Report a reproducible problem in the demo or API workflow
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which app version are you using? Check `GET /api/health` or the `VERSION` file.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web workbench
        - Transcript analysis
        - Audio upload
        - Local ASR
        - Moonshot or Kimi integration
        - Knowledge base or training scripts
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the demo
        2. Upload an audio file
        3. Click generate review
        4. Observe the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste terminal logs, API responses, or screenshots if available.
      render: shell

